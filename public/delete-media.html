<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>حذف عنصر من قاعدة البيانات</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06152b;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: #0b1d39;
      padding: 30px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 30px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #071427;
      color: white;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      background: #071427;
      min-height: 50px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>حذف عنصر من MongoDB</h1>

    <input
      type="text"
      id="itemId"
      placeholder="أدخل MongoDB _id هنا"
    />

    <button onclick="deleteItem()">
      حذف الآن
    </button>

    <div
      class="result"
      id="result"
    >
      أدخل الـ ID ثم اضغط حذف.
    </div>
  </div>

  <script>
    async function deleteItem() {
      const id = document
        .getElementById("itemId")
        .value
        .trim();

      const resultBox =
        document.getElementById("result");

      if (!id) {
        resultBox.innerText =
          "يرجى إدخال الـ ID أولاً.";
        return;
      }

      resultBox.innerText =
        "جاري الحذف...";

      try {
        const res = await fetch(
          "/api/delete-user",
          {
            method: "DELETE",
            headers: {
              "Content-Type":
                "application/json",
            },
            body: JSON.stringify({
              id,
            }),
          }
        );

        const data =
          await res.json();

        if (data.success) {
          resultBox.innerText =
            "تم الحذف بنجاح ✔";
        } else {
          resultBox.innerText =
            data.error ||
            "فشل الحذف.";
        }
      } catch (error) {
        resultBox.innerText =
          "حدث خطأ أثناء الاتصال.";
      }
    }
  </script>

</body>
</html>
