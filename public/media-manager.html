<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>لوحة إدارة الوسائط</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06152b;
      color: white;
      padding: 20px;
    }

    h1,
    h2 {
      text-align: center;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .form-box,
    .items-box {
      background: #0b1d39;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 30px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    input,
    textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      background: #071427;
      color: white;
      box-sizing: border-box;
      font-size: 16px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px;
    }

    .save-btn {
      background: #3b82f6;
      color: white;
    }

    .save-btn:hover {
      opacity: 0.9;
    }

    .delete-btn {
      background: red;
      color: white;
      margin-top: 10px;
    }

    .delete-btn:hover {
      opacity: 0.9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(
        auto-fill,
        minmax(280px, 1fr)
      );
      gap: 20px;
    }

    .card {
      background: #071427;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .card p {
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
      min-height: 40px;
    }

    .status {
      text-align: center;
      margin-top: 10px;
      font-size: 18px;
    }

    .video-link {
      display: inline-block;
      margin-top: 8px;
      color: #3b82f6;
      text-decoration: none;
      font-weight: bold;
    }

    .video-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>لوحة إدارة الصور والفيديو</h1>

  <!-- Upload Section -->
  <div class="form-box">
    <h2>إضافة عنصر جديد</h2>

    <input
      type="text"
      id="name"
      placeholder="اسم المنتج / الصورة"
    />

    <textarea
      id="description"
      placeholder="الوصف (اختياري)"
    ></textarea>

    <input
      type="text"
      id="imageUrl"
      placeholder="رابط الصورة"
    />

    <input
      type="text"
      id="videoUrl"
      placeholder="رابط الفيديو (اختياري)"
    />

    <button
      class="save-btn"
      onclick="saveItem()"
    >
      حفظ العنصر
    </button>

    <div
      class="status"
      id="saveStatus"
    ></div>
  </div>

  <!-- Items Section -->
  <div class="items-box">
    <h2>كل العناصر</h2>

    <div
      id="items"
      class="grid"
    >
      جاري التحميل...
    </div>
  </div>

</div>

<script>
  async function saveItem() {
    const name =
      document
        .getElementById("name")
        .value
        .trim();

    const description =
      document
        .getElementById("description")
        .value
        .trim();

    const imageUrl =
      document
        .getElementById("imageUrl")
        .value
        .trim();

    const videoUrl =
      document
        .getElementById("videoUrl")
        .value
        .trim();

    const saveStatus =
      document.getElementById(
        "saveStatus"
      );

    // مطلوب فقط الاسم + رابط الصورة
    if (!name || !imageUrl) {
      saveStatus.innerText =
        "الاسم ورابط الصورة مطلوبان.";
      return;
    }

    saveStatus.innerText =
      "جاري الحفظ...";

    try {
      const res = await fetch(
        "/api/save-user",
        {
          method: "POST",
          headers: {
            "Content-Type":
              "application/json",
          },
          body: JSON.stringify({
            name: name,
            // لأن API الحالي يتطلب email
            email:
              description ||
              "بدون وصف",
            phone: JSON.stringify({
              imageUrl: imageUrl,
              videoUrl: videoUrl,
            }),
          }),
        }
      );

      const data =
        await res.json();

      if (res.ok && data.success) {
        saveStatus.innerText =
          "تم الحفظ بنجاح ✔";

        // تنظيف الحقول
        document.getElementById(
          "name"
        ).value = "";

        document.getElementById(
          "description"
        ).value = "";

        document.getElementById(
          "imageUrl"
        ).value = "";

        document.getElementById(
          "videoUrl"
        ).value = "";

        loadItems();
      } else {
        saveStatus.innerText =
          data.error ||
          "فشل الحفظ";
      }
    } catch (error) {
      saveStatus.innerText =
        "خطأ أثناء الاتصال";
    }
  }

  async function loadItems() {
    const container =
      document.getElementById(
        "items"
      );

    try {
      const res = await fetch(
        "/api/get-users"
      );

      const data =
        await res.json();

      if (
        !res.ok ||
        !data.success ||
        !Array.isArray(data.data)
      ) {
        container.innerHTML =
          "فشل تحميل البيانات";
        return;
      }

      container.innerHTML = "";

      data.data.forEach(
        (item) => {
          let media = {};

          try {
            media = item.phone
              ? JSON.parse(
                  item.phone
                )
              : {};
          } catch {
            media = {};
          }

          const card =
            document.createElement(
              "div"
            );

          card.className = "card";

          card.innerHTML = `
            ${
              media.imageUrl
                ? `
                <img
                  src="${media.imageUrl}"
                  alt="${item.name || ""}"
                  onerror="this.src='/images/default-product.jpg'"
                />
              `
                : ""
            }

            <h3>
              ${
                item.name ||
                "بدون اسم"
              }
            </h3>

            <p>
              ${
                item.email ===
                "بدون وصف"
                  ? ""
                  : item.email ||
                    ""
              }
            </p>

            ${
              media.videoUrl
                ? `
                <a
                  href="${media.videoUrl}"
                  target="_blank"
                  class="video-link"
                >
                  مشاهدة الفيديو
                </a>
              `
                : ""
            }

            <button
              class="delete-btn"
              onclick="deleteItem('${item._id}')"
            >
              حذف
            </button>
          `;

          container.appendChild(
            card
          );
        }
      );

      if (
        data.data.length === 0
      ) {
        container.innerHTML =
          "لا توجد عناصر حالياً";
      }
    } catch (error) {
      container.innerHTML =
        "حدث خطأ أثناء التحميل";
    }
  }

  async function deleteItem(
    id
  ) {
    if (
      !confirm(
        "هل أنت متأكد من الحذف؟"
      )
    ) {
      return;
    }

    try {
      const res = await fetch(
        "/api/delete-user",
        {
          method: "DELETE",
          headers: {
            "Content-Type":
              "application/json",
          },
          body: JSON.stringify({
            id: id,
          }),
        }
      );

      const data =
        await res.json();

      if (res.ok && data.success) {
        alert(
          "تم الحذف بنجاح ✔"
        );

        loadItems();
      } else {
        alert(
          data.error ||
            "فشل الحذف"
        );
      }
    } catch (error) {
      alert(
        "خطأ أثناء الحذف"
      );
    }
  }

  // تحميل العناصر عند فتح الصفحة
  loadItems();
</script>

</body>
</html>
