<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة إدارة الوسائط</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06152b;
      color: white;
      padding: 20px;
    }

    h1, h2 {
      text-align: center;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .form-box,
    .items-box {
      background: #0b1d39;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      background: #071427;
      color: white;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .save-btn {
      background: #3b82f6;
      color: white;
    }

    .delete-btn {
      background: red;
      color: white;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
      gap: 20px;
    }

    .card {
      background: #071427;
      padding: 15px;
      border-radius: 14px;
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 10px;
    }

    .status {
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>لوحة إدارة الصور والفيديو</h1>

  <!-- Upload Section -->
  <div class="form-box">
    <h2>إضافة عنصر جديد</h2>

    <input type="text" id="name" placeholder="اسم المنتج / الصورة" />

    <textarea id="description" placeholder="الوصف"></textarea>

    <input type="text" id="imageUrl" placeholder="رابط الصورة" />

    <input type="text" id="videoUrl" placeholder="رابط الفيديو (اختياري)" />

    <button class="save-btn" onclick="saveItem()">
      حفظ العنصر
    </button>

    <div class="status" id="saveStatus"></div>
  </div>

  <!-- Items Section -->
  <div class="items-box">
    <h2>كل العناصر</h2>

    <div id="items" class="grid">
      جاري التحميل...
    </div>
  </div>

</div>

<script>
  async function saveItem() {
    const name =
      document.getElementById("name").value.trim();

    const description =
      document.getElementById("description").value.trim();

    const imageUrl =
      document.getElementById("imageUrl").value.trim();

    const videoUrl =
      document.getElementById("videoUrl").value.trim();

    const saveStatus =
      document.getElementById("saveStatus");

    if (!name || !imageUrl) {
      saveStatus.innerText =
        "الاسم ورابط الصورة مطلوبان.";
      return;
    }

    try {
      const res = await fetch(
        "/api/save-user",
        {
          method: "POST",
          headers: {
            "Content-Type":
              "application/json",
          },
          body: JSON.stringify({
            name,
            email: description,
            phone: JSON.stringify({
              imageUrl,
              videoUrl,
            }),
          }),
        }
      );

      const data = await res.json();

      if (data.success) {
        saveStatus.innerText =
          "تم الحفظ بنجاح ✔";

        document.getElementById("name").value = "";
        document.getElementById("description").value = "";
        document.getElementById("imageUrl").value = "";
        document.getElementById("videoUrl").value = "";

        loadItems();
      } else {
        saveStatus.innerText =
          data.error || "فشل الحفظ";
      }
    } catch {
      saveStatus.innerText =
        "خطأ أثناء الاتصال";
    }
  }

  async function loadItems() {
    const container =
      document.getElementById("items");

    try {
      const res = await fetch(
        "/api/get-users"
      );

      const data = await res.json();

      if (!data.success) {
        container.innerHTML =
          "فشل تحميل البيانات";
        return;
      }

      container.innerHTML = "";

      data.data.forEach(item => {
        let media = {};

        try {
          media = item.phone
            ? JSON.parse(item.phone)
            : {};
        } catch {}

        const card =
          document.createElement("div");

        card.className = "card";

        card.innerHTML = `
          ${
            media.imageUrl
              ? `<img src="${media.imageUrl}" alt="${item.name}" />`
              : ""
          }

          <h3>${item.name || ""}</h3>

          <p>${
            item.email || ""
          }</p>

          ${
            media.videoUrl
              ? `<a href="${media.videoUrl}" target="_blank" style="color:#3b82f6;">مشاهدة الفيديو</a>`
              : ""
          }

          <button class="delete-btn" onclick="deleteItem('${item._id}')">
            حذف
          </button>
        `;

        container.appendChild(card);
      });
    } catch {
      container.innerHTML =
        "حدث خطأ أثناء التحميل";
    }
  }

  async function deleteItem(id) {
    if (!confirm("هل أنت متأكد من الحذف؟")) {
      return;
    }

    try {
      const res = await fetch(
        "/api/delete-user",
        {
          method: "DELETE",
          headers: {
            "Content-Type":
              "application/json",
          },
          body: JSON.stringify({
            id,
          }),
        }
      );

      const data =
        await res.json();

      if (data.success) {
        loadItems();
      } else {
        alert(
          data.error || "فشل الحذف"
        );
      }
    } catch {
      alert(
        "خطأ أثناء الحذف"
      );
    }
  }

  loadItems();
</script>

</body>
</html>
