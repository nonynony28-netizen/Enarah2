<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>لوحة التحكم</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #06152b;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .card {
      background: #0b1d39;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .product-card {
      border-right: 4px solid #3b82f6;
    }

    .contact-card {
      border-right: 4px solid #22c55e;
      background: rgba(34, 197, 94, 0.08);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .product-badge {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
    }

    .contact-badge {
      background: rgba(34, 197, 94, 0.15);
      color: #4ade80;
    }

    img {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    h3 {
      margin: 10px 0;
    }

    p {
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.8);
      word-break: break-word;
    }

    .label {
      color: white;
      font-weight: bold;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: red;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <h1>لوحة التحكم</h1>

  <div id="items" class="grid">
    جاري التحميل...
  </div>

  <script>
    async function loadItems() {
      const container =
        document.getElementById(
          "items"
        );

      try {
        const res = await fetch(
          "/api/get-users"
        );

        const data =
          await res.json();

        if (!data.success) {
          container.innerHTML =
            "فشل تحميل البيانات";
          return;
        }

        container.innerHTML = "";

        data.data.forEach(
          (item) => {
            let media = {};

            try {
              media = item.phone
                ? JSON.parse(
                    item.phone
                  )
                : {};
            } catch {}

            const card =
              document.createElement(
                "div"
              );

            card.className =
              "card";

            // =====================================
            // Contact Messages
            // =====================================
            if (
              item.type ===
              "contact"
            ) {
              card.classList.add(
                "contact-card"
              );

              card.innerHTML = `
                <span class="badge contact-badge">
                  رسالة عميل
                </span>

                <h3>
                  ${item.name || "بدون اسم"}
                </h3>

                <p>
                  <span class="label">الهاتف:</span>
                  ${
                    item.phone ||
                    "غير متوفر"
                  }
                </p>

                <p>
                  <span class="label">الرسالة:</span>
                  ${
                    item.email ||
                    "لا توجد رسالة"
                  }
                </p>

                <button onclick="deleteItem('${item._id}')">
                  حذف الرسالة
                </button>
              `;
            }

            // =====================================
            // Products
            // =====================================
            else {
              card.classList.add(
                "product-card"
              );

              card.innerHTML = `
                <span class="badge product-badge">
                  منتج
                </span>

                ${
                  media.imageUrl
                    ? `<img src="${media.imageUrl}" alt="product image" />`
                    : ""
                }

                <h3>
                  ${
                    item.name ||
                    "بدون اسم"
                  }
                </h3>

                <p>
                  ${
                    item.email &&
                    !item.email.includes(
                      "@upload.local"
                    )
                      ? item.email
                      : ""
                  }
                </p>

                <button onclick="deleteItem('${item._id}')">
                  حذف المنتج
                </button>
              `;
            }

            container.appendChild(
              card
            );
          }
        );

        // =====================================
        // Empty State
        // =====================================
        if (
          !data.data.length
        ) {
          container.innerHTML =
            "لا توجد بيانات حالياً";
        }
      } catch {
        container.innerHTML =
          "حدث خطأ أثناء التحميل";
      }
    }

    async function deleteItem(
      id
    ) {
      if (
        !confirm(
          "هل أنت متأكد من الحذف؟"
        )
      ) {
        return;
      }

      try {
        const res = await fetch(
          "/api/delete-user",
          {
            method: "DELETE",
            headers: {
              "Content-Type":
                "application/json",
            },
            body: JSON.stringify(
              {
                id,
              }
            ),
          }
        );

        const data =
          await res.json();

        if (
          data.success
        ) {
          alert(
            "تم الحذف بنجاح"
          );

          loadItems();
        } else {
          alert(
            data.error ||
              "فشل الحذف"
          );
        }
      } catch {
        alert(
          "حدث خطأ أثناء الحذف"
        );
      }
    }

    loadItems();
  </script>

</body>
</html>
