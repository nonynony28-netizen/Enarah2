<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم</title>
  <style>
    body { margin: 0; font-family: Arial; background: #06152b; color: white; padding: 20px; }
    h1 { text-align: center; margin-bottom: 30px; }
    .stats-container { display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
    .stat-box { flex: 1; min-width: 200px; padding: 20px; border-radius: 15px; text-align: center; }
    .stat-visitors { background: linear-gradient(135deg, #3b82f6, #2563eb); box-shadow: 0 10px 20px rgba(59,130,246,0.2); }
    .stat-items { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 10px 20px rgba(16,185,129,0.2); }
    .admin-actions { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
    .admin-actions a, .admin-actions button {
      flex: 1; min-width: 120px; padding: 12px; text-align: center; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; transition: 0.3s;
    }
    .add-btn { background: #10b981; color: white; }
    .filter-all { background: #3b82f6; color: white; }
    .filter-product { background: #8b5cf6; color: white; }
    .filter-project { background: #eab308; color: white; }
    .filter-contact { background: #f43f5e; color: white; }
    .update-prices-btn { background: #f59e0b; color: white; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .card { background: #0d2342; border-radius: 15px; padding: 20px; position: relative; border: 1px solid rgba(255,255,255,0.05); }
    .badge { position: absolute; top: 15px; left: 15px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .contact-badge { background: rgba(244, 63, 94, 0.2); color: #fda4af; }
    .product-badge { background: rgba(139, 92, 246, 0.2); color: #ddd6fe; }
    .project-badge { background: rgba(234, 179, 8, 0.2); color: #fef08a; }
    .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; margin-top: 25px; }
    .delete-btn { margin-top: 14px; width: 100%; padding: 12px; border: none; border-radius: 10px; background: red; color: white; cursor: pointer; font-size: 15px; font-weight: bold; }
    .delete-btn:hover { opacity: 0.9; }
    .edit-btn { margin-top: 14px; width: 100%; padding: 12px; border: none; border-radius: 10px; background: #3b82f6; color: white; cursor: pointer; font-size: 15px; font-weight: bold; }
    .edit-btn:hover { opacity: 0.9; }
    .label { font-weight: bold; color: #94a3b8; }
    /* ستايل نافذة الأسعار */
    .modal-input { width: 100px; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #3b82f6; background: #06152b; color: white; font-weight: bold;}
    .modal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;}
  </style>
</head>
<body>

  <h1>لوحة التحكم والإدارة</h1>

  <!-- إحصائيات الموقع -->
  <div class="stats-container">
    <div class="stat-box stat-visitors">
      <h2 style="margin: 0; font-size: 16px; color: #bfdbfe;">عدد الزوار (أجهزة فريدة) 👁️</h2>
      <h3 id="visitorCount" style="margin: 10px 0 0; font-size: 32px; font-weight: bold;">...</h3>
    </div>
    <div class="stat-box stat-items">
      <h2 style="margin: 0; font-size: 16px; color: #a7f3d0;">إجمالي المنتجات والمشاريع 📦</h2>
      <h3 id="totalItemsCount" style="margin: 10px 0 0; font-size: 32px; font-weight: bold;">...</h3>
    </div>
  </div>

  <div class="admin-actions">
    <button class="update-prices-btn" onclick="openWireModal()">تحديث أسعار الأسلاك ⚡</button>
    <a href="/media-uploader.html" class="add-btn">إضافة منتج/مشروع +</a>
    <button class="filter-all" onclick="filterType('all')">الكل</button>
    <button class="filter-product" onclick="filterType('product')">المنتجات 🔵</button>
    <button class="filter-project" onclick="filterType('project')">المشاريع 🟡</button>
    <button class="filter-contact" onclick="filterType('contact')">الرسائل/الطلبات 🔴</button>
  </div>

  <div id="items" class="grid">جاري تحميل البيانات...</div>

  <!-- نافذة تحديث الأسعار المنبثقة -->
  <div id="wireModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center;">
    <div style="background:#0d2342; padding:30px; border-radius:20px; width:350px; border:1px solid rgba(59,130,246,0.3); box-shadow: 0 0 30px rgba(59,130,246,0.2);">
       <h2 style="margin-top:0; color:white; text-align:center;">تحديث أسعار الأسلاك (د.ل)</h2>
       <div style="margin-top:20px;">
         <div class="modal-row"><label>1.5 ملي:</label> <input type="number" id="p_1_5" class="modal-input" /></div>
         <div class="modal-row"><label>2.5 ملي:</label> <input type="number" id="p_2_5" class="modal-input" /></div>
         <div class="modal-row"><label>4.0 ملي:</label> <input type="number" id="p_4_0" class="modal-input" /></div>
         <div class="modal-row"><label>6.0 ملي:</label> <input type="number" id="p_6_0" class="modal-input" /></div>
         <div class="modal-row"><label>10.0 ملي:</label> <input type="number" id="p_10_0" class="modal-input" /></div>
         <div class="modal-row"><label>16.0 ملي:</label> <input type="number" id="p_16_0" class="modal-input" /></div>
         <div class="modal-row"><label>25.0 ملي:</label> <input type="number" id="p_25_0" class="modal-input" /></div>
       </div>
       <div style="display:flex; gap:10px; margin-top:25px;">
         <button id="savePricesBtn" onclick="saveWirePrices()" style="flex:1; padding:12px; background:#3b82f6; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">حفظ ونشر</button>
         <button onclick="closeWireModal()" style="flex:1; padding:12px; background:#f43f5e; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">إلغاء</button>
       </div>
    </div>
  </div>

  <!-- نافذة تعديل المنتجات والمشاريع المنبثقة -->
  <div id="editModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; justify-content:center; align-items:center; padding: 20px;">
    <div style="background:#0d2342; padding:30px; border-radius:20px; width:100%; max-width:450px; border:1px solid rgba(59,130,246,0.3); box-shadow: 0 0 30px rgba(59,130,246,0.2); max-height: 90vh; overflow-y: auto;">
       <h2 id="editModalTitle" style="margin-top:0; color:white; text-align:center;">تعديل العنصر</h2>
       <input type="hidden" id="edit_id" />
       <input type="hidden" id="edit_type" />
       
       <div style="margin-top:20px;">
         <div style="margin-bottom: 15px;">
           <label style="display:block; margin-bottom:5px; font-weight:bold;">الاسم / العنوان:</label>
           <input type="text" id="edit_name" style="width:100%; padding:10px; border-radius:8px; border:1px solid #3b82f6; background:#06152b; color:white; box-sizing: border-box;" />
         </div>
         <div style="margin-bottom: 15px;">
           <label style="display:block; margin-bottom:5px; font-weight:bold;">الوصف:</label>
           <textarea id="edit_description" style="width:100%; min-height:80px; padding:10px; border-radius:8px; border:1px solid #3b82f6; background:#06152b; color:white; box-sizing: border-box; resize: vertical;"></textarea>
         </div>
          <div style="margin-bottom: 15px;">
            <label id="editImageLabel" style="display:block; margin-bottom:5px; font-weight:bold;">رابط الصورة:</label>
            <input type="text" id="edit_imageUrl" style="width:100%; padding:10px; border-radius:8px; border:1px solid #3b82f6; background:#06152b; color:white; box-sizing: border-box;" />
          </div>
         <div style="margin-bottom: 15px;">
           <label style="display:block; margin-bottom:5px; font-weight:bold;">رابط الفيديو (اختياري):</label>
           <input type="text" id="edit_videoUrl" style="width:100%; padding:10px; border-radius:8px; border:1px solid #3b82f6; background:#06152b; color:white; box-sizing: border-box;" />
         </div>
         <div id="editCategoryRow" style="margin-bottom: 15px; display: none;">
           <label style="display:block; margin-bottom:5px; font-weight:bold;">التصنيف (للمشاريع):</label>
           <input type="text" id="edit_category" style="width:100%; padding:10px; border-radius:8px; border:1px solid #3b82f6; background:#06152b; color:white; box-sizing: border-box;" />
         </div>
       </div>
       <div style="display:flex; gap:10px; margin-top:25px;">
         <button id="saveEditBtn" onclick="saveItemEdit()" style="flex:1; padding:12px; background:#10b981; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:16px;">حفظ التغييرات</button>
         <button onclick="closeEditModal()" style="flex:1; padding:12px; background:#f43f5e; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:16px;">إلغاء</button>
       </div>
    </div>
  </div>

  <script>
    let allItems = [];
    let currentFilter = "all";

    function getAdminPassword() {
      let pwd = sessionStorage.getItem('admin_password');
      if (!pwd) {
        pwd = prompt('الرجاء إدخال كلمة مرور مدير النظام:');
        if (pwd) {
          sessionStorage.setItem('admin_password', pwd);
        }
      }
      return pwd || "";
    }

    async function loadItems() {
      const container = document.getElementById("items");
      try {
        const pwd = getAdminPassword();
        if (!pwd) {
          container.innerHTML = "<div style='text-align:center; padding:20px;'><h3>يرجى إدخال كلمة مرور صالحة لتصفح لوحة التحكم.</h3><button onclick='location.reload()' style='padding:10px 20px; background:#3b82f6; border:none; border-radius:5px; color:white; font-weight:bold; cursor:pointer;'>إعادة المحاولة</button></div>";
          return;
        }

        const res = await fetch("https://enarah2.vercel.app/api/get-users", {
          headers: {
            "x-admin-password": pwd
          }
        });

        if (res.status === 401) {
          alert("كلمة المرور غير صحيحة أو منتهية الصلاحية!");
          sessionStorage.removeItem("admin_password");
          location.reload();
          return;
        }

        const data = await res.json();
        if (!data.success) { container.innerHTML = "فشل في جلب البيانات"; return; }
        
        // التحقق من حالة الإدارة في الاستجابة
        if (!data.isAdmin) {
          alert("تنبيه: أنت تتصفح لوحة التحكم بوضع غير مصرح (البيانات العامة فقط معروضة). يرجى إدخال كلمة المرور الصحيحة.");
          sessionStorage.removeItem("admin_password");
          location.reload();
          return;
        }

        allItems = data.data.reverse(); 

        const visits = allItems.filter(item => item.email && item.email.includes("@analytics.local"));
        document.getElementById("visitorCount").innerText = visits.length;

        const validItems = allItems.filter(item => item.type !== "contact" && (!item.email || !item.email.includes("@analytics.local")) && item.email !== "admin_wire_prices@app.local");
        document.getElementById("totalItemsCount").innerText = validItems.length;

        renderItems();
      } catch (err) { 
        container.innerHTML = "حدث خطأ أثناء الاتصال بالسيرفر"; 
        console.error(err);
      }
    }

    function renderItems() {
      const container = document.getElementById("items");
      container.innerHTML = "";
      try {
        const filteredItems = allItems.filter((item) => {
          if (item.email && (item.email.includes("@analytics.local") || item.email === "admin_wire_prices@app.local")) return false; 
          
          let media = {}; try { media = item.phone ? JSON.parse(item.phone) : {}; } catch {}

          if (currentFilter === "all") return true;
          if (currentFilter === "contact") return item.type === "contact";
          if (currentFilter === "project") return item.type !== "contact" && media.type === "project";
          if (currentFilter === "product") return item.type !== "contact" && media.type !== "project";
          return true;
        });

        filteredItems.forEach((item) => {
          let media = {}; try { media = item.phone ? JSON.parse(item.phone) : {}; } catch {}
          const card = document.createElement("div"); card.className = "card";

          if (item.type === "contact") {
            card.innerHTML = `<span class="badge contact-badge">طلب/رسالة 🔴</span>
              <h3 style="margin-top: 30px;">${item.name || "بدون اسم"}</h3>
              <p><span class="label">رقم الهاتف:</span> ${item.phone || "لا يوجد"}</p>
              <p><span class="label">التفاصيل:</span> ${item.email || "لا يوجد"}</p>
              <button class="delete-btn" onclick="deleteItem('${item._id}')">مسح الطلب</button>`;
          }
          else if (media.type === "project") {
            const rawImage = media.imageUrl || '';
            const coverImage = rawImage.split(',')[0]?.trim() || '/images/default-product.jpg';
            card.innerHTML = `<span class="badge project-badge">مشروع 🟡</span>
              ${rawImage ? `<img src="${coverImage}" alt="project image" />` : ""}
              <h3>${item.name || "مشروع بدون اسم"}</h3>
              <p><span class="label">التصنيف:</span> ${media.category || "غير محدد"}</p>
              <p>${media.description || ""}</p>
              <div style="display: flex; gap: 10px; margin-top: 14px;">
                <button class="edit-btn" style="margin-top: 0; flex: 1;" onclick="openEditModal('${item._id}')">تعديل ✏️</button>
                <button class="delete-btn" style="margin-top: 0; flex: 1;" onclick="deleteItem('${item._id}')">حذف 🗑️</button>
              </div>`;
          }
          else {
            card.innerHTML = `<span class="badge product-badge">منتج 🔵</span>
              ${media.imageUrl ? `<img src="${media.imageUrl}" alt="product image" />` : ""}
              <h3>${item.name || "منتج بدون اسم"}</h3>
              <p>${media.description || ""}</p>
              <div style="display: flex; gap: 10px; margin-top: 14px;">
                <button class="edit-btn" style="margin-top: 0; flex: 1;" onclick="openEditModal('${item._id}')">تعديل ✏️</button>
                <button class="delete-btn" style="margin-top: 0; flex: 1;" onclick="deleteItem('${item._id}')">حذف 🗑️</button>
              </div>`;
          }
          container.appendChild(card);
        });

        if (!filteredItems.length) {
          container.innerHTML = `<div style="text-align:center; grid-column: 1/-1; padding: 20px;">
            <h3>لا توجد بيانات متاحة</h3>
            <p style="color: #64748b; font-size: 14px;">نوع الفلتر الحالي: ${currentFilter} | إجمالي العناصر: ${allItems.length}</p>
          </div>`;
        }
      } catch (err) {
        container.innerHTML = `<div style="text-align:center; grid-column: 1/-1; color: #f43f5e; padding: 20px; border: 1px dashed #f43f5e; border-radius: 10px; background: rgba(244, 63, 94, 0.05);">
          <h3>حدث خطأ أثناء عرض العناصر</h3>
          <p>${err.message}</p>
          <pre style="text-align: left; background: #06152b; padding: 10px; border-radius: 5px; overflow-x: auto; color: #fda4af;">${err.stack}</pre>
        </div>`;
      }
    }

    function filterType(type) { currentFilter = type; renderItems(); }

    async function deleteItem(id) {
      if (!confirm("هل أنت متأكد من الحذف؟")) return;
      const pwd = getAdminPassword();
      const res = await fetch("https://enarah2.vercel.app/api/delete-user", { 
        method: "DELETE", 
        headers: { 
          "Content-Type": "application/json",
          "x-admin-password": pwd
        }, 
        body: JSON.stringify({ id }) 
      });

      if (res.status === 401) {
        alert("انتهت صلاحية الجلسة أو كلمة المرور غير صحيحة!");
        sessionStorage.removeItem("admin_password");
        location.reload();
        return;
      }

      loadItems(); 
    }

    // دوال أسعار الأسلاك
    function openWireModal() {
      document.getElementById('wireModal').style.display = 'flex';
      const wireUpdates = allItems.filter(item => item.email === "admin_wire_prices@app.local");
      if(wireUpdates.length > 0) {
         try {
           const latest = JSON.parse(wireUpdates[0].phone).prices; // allItems is reversed
           document.getElementById('p_1_5').value = latest['1.5'] || 45;
           document.getElementById('p_2_5').value = latest['2.5'] || 75;
           document.getElementById('p_4_0').value = latest['4.0'] || 115;
           document.getElementById('p_6_0').value = latest['6.0'] || 165;
           document.getElementById('p_10_0').value = latest['10.0'] || 290;
           document.getElementById('p_16_0').value = latest['16.0'] || 450;
           document.getElementById('p_25_0').value = latest['25.0'] || 680;
         }catch(e){}
      } else {
           document.getElementById('p_1_5').value = 45;
           document.getElementById('p_2_5').value = 75;
           document.getElementById('p_4_0').value = 115;
           document.getElementById('p_6_0').value = 165;
           document.getElementById('p_10_0').value = 290;
           document.getElementById('p_16_0').value = 450;
           document.getElementById('p_25_0').value = 680;
      }
    }
    
    function closeWireModal() { document.getElementById('wireModal').style.display = 'none'; }

    async function saveWirePrices() {
      const btn = document.getElementById('savePricesBtn');
      btn.innerText = 'جاري النشر...';
      const prices = {
        '1.5': document.getElementById('p_1_5').value,
        '2.5': document.getElementById('p_2_5').value,
        '4.0': document.getElementById('p_4_0').value,
        '6.0': document.getElementById('p_6_0').value,
        '10.0': document.getElementById('p_10_0').value,
        '16.0': document.getElementById('p_16_0').value,
        '25.0': document.getElementById('p_25_0').value,
      };
      
      const pwd = getAdminPassword();
      const res = await fetch("https://enarah2.vercel.app/api/save-user", {
        method: "POST", 
        headers: { 
          "Content-Type": "application/json",
          "x-admin-password": pwd
        },
        body: JSON.stringify({ name: "Wire Prices Update", email: "admin_wire_prices@app.local", phone: JSON.stringify({ type: "wire_prices", prices }) })
      });

      if (res.status === 401) {
        alert("غير مصرح لك بالعملية أو كلمة المرور غير صحيحة!");
        sessionStorage.removeItem("admin_password");
        location.reload();
        return;
      }

      alert('تم تحديث الأسعار بنجاح في الموقع!');
      btn.innerText = 'حفظ ونشر';
      closeWireModal();
      loadItems();
    }

    // دوال تعديل المنتجات والمشاريع
    function openEditModal(id) {
      const item = allItems.find(i => i._id === id);
      if (!item) return;

      document.getElementById('edit_id').value = id;
      document.getElementById('edit_name').value = item.name || '';
      
      let media = {};
      try {
        media = item.phone ? JSON.parse(item.phone) : {};
      } catch (e) {
        media = {};
      }
      
      document.getElementById('edit_type').value = media.type || 'product';
      document.getElementById('edit_description').value = media.description || '';
      document.getElementById('edit_imageUrl').value = media.imageUrl || '';
      document.getElementById('edit_videoUrl').value = media.videoUrl || '';
      
      const categoryRow = document.getElementById('editCategoryRow');
      const categoryInput = document.getElementById('edit_category');
      const editImageLabel = document.getElementById('editImageLabel');
      const editImageUrlInput = document.getElementById('edit_imageUrl');
      
      if (media.type === 'project') {
        categoryRow.style.display = 'block';
        categoryInput.value = media.category || '';
        document.getElementById('editModalTitle').innerText = 'تعديل المشروع 🟡';
        editImageLabel.innerText = 'روابط الصور (يمكنك وضع عدة روابط مفصولة بفاصلة ",")';
        editImageUrlInput.placeholder = 'https://example.com/1.jpg, https://example.com/2.jpg';
      } else {
        categoryRow.style.display = 'none';
        categoryInput.value = '';
        document.getElementById('editModalTitle').innerText = 'تعديل المنتج 🔵';
        editImageLabel.innerText = 'رابط الصورة:';
        editImageUrlInput.placeholder = 'https://example.com/image.jpg';
      }

      document.getElementById('editModal').style.display = 'flex';
    }

    function closeEditModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    async function saveItemEdit() {
      const id = document.getElementById('edit_id').value;
      const name = document.getElementById('edit_name').value.trim();
      const type = document.getElementById('edit_type').value;
      const description = document.getElementById('edit_description').value.trim();
      const imageUrl = document.getElementById('edit_imageUrl').value.trim();
      const videoUrl = document.getElementById('edit_videoUrl').value.trim();
      const category = document.getElementById('edit_category').value.trim();

      if (!name) {
        alert('الاسم مطلوب.');
        return;
      }

      const saveEditBtn = document.getElementById('saveEditBtn');
      saveEditBtn.innerText = 'جاري الحفظ...';
      saveEditBtn.disabled = true;

      try {
        const phoneObj = {
          imageUrl,
          videoUrl,
          description,
          type,
        };
        if (type === 'project') {
          phoneObj.category = category;
        }

        const pwd = getAdminPassword();
        const res = await fetch("https://enarah2.vercel.app/api/update-user", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "x-admin-password": pwd
          },
          body: JSON.stringify({
            id,
            name,
            phone: JSON.stringify(phoneObj)
          })
        });

        if (res.status === 401) {
          alert("غير مصرح لك بالعملية أو كلمة المرور غير صحيحة!");
          sessionStorage.removeItem("admin_password");
          location.reload();
          return;
        }

        const data = await res.json();

        if (res.ok && data.success) {
          alert('تم تعديل البيانات بنجاح!');
          closeEditModal();
          loadItems();
        } else {
          alert(data.error || 'حدث خطأ أثناء التعديل');
        }
      } catch (error) {
        alert('فشل في الاتصال بالسيرفر.');
      } finally {
        saveEditBtn.innerText = 'حفظ التغييرات';
        saveEditBtn.disabled = false;
      }
    }

    loadItems();
  </script>
</body>
</html>
