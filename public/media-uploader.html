<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة الرفع للمنتجات والمشاريع</title>
  <style>
    body {
      margin: 0; font-family: Arial, sans-serif; background: #071122; color: white;
      display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;
    }
    .container {
      width: 100%; max-width: 700px; background: #0d1b34; border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px; padding: 30px; box-shadow: 0 0 25px rgba(59, 130, 246, 0.15);
    }
    h1 { text-align: center; margin-bottom: 10px; font-size: 32px; }
    p { text-align: center; color: rgba(255, 255, 255, 0.65); margin-bottom: 30px; }
    label { display: block; margin-bottom: 8px; font-weight: bold; color: rgba(255, 255, 255, 0.85); }
    input, textarea, select {
      width: 100%; padding: 14px; margin-bottom: 18px; border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08); background: #071122; color: white;
      font-size: 16px; box-sizing: border-box;
    }
    textarea { min-height: 120px; resize: vertical; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #3b82f6; }
    button {
      width: 100%; padding: 15px; border: none; border-radius: 10px; background: #3b82f6;
      color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #60a5fa; }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .response {
      margin-top: 20px; padding: 15px; border-radius: 10px; background: #071122;
      border: 1px solid rgba(255, 255, 255, 0.05); text-align: center; display: none; white-space: pre-wrap;
    }
    .success { color: #86efac; }
    .error { color: #fca5a5; }
    .preview-box {
      margin-top: -10px; margin-bottom: 20px; text-align: center;
    }
    .preview-box img {
      max-width: 100%; max-height: 220px; border-radius: 12px; border: 2px solid #3b82f6; display: none; box-shadow: 0 4px 15px rgba(59,130,246,0.3);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>إضافة للموقع</h1>
    <p>ارفع منتجاتك ومشاريعك بسهولة مع تحويل وتحسين فوري للصور عبر Cloudflare R2</p>

    <label for="itemType">ما الذي تريد رفعه؟</label>
    <select id="itemType">
      <option value="product">منتج (يظهر في صفحة المنتجات)</option>
      <option value="project">مشروع (يظهر في صفحة المشاريع والرئيسية)</option>
    </select>

    <div id="categoryContainer">
      <label for="category">قسم المنتج / تصنيف المشروع</label>
      <select id="category" style="width:100%; padding:12px; background:#0c1e38; color:#fff; border:1px solid rgba(59,130,246,0.3); border-radius:12px; margin-bottom:15px; font-weight:bold;">
        <option value="الأسلاك والكوابل">الأسلاك والكوابل 🔌</option>
        <option value="سبوت لايت">سبوت لايت 💡</option>
        <option value="مفاتيح وبرايز">مفاتيح وبرايز ⚡</option>
        <option value="ثريات">ثريات 💎</option>
        <option value="سكة الليد">سكة الليد 🔦</option>
        <option value="انترفون">انترفون 🔔</option>
        <option value="مواد تأسيس الكهربائي">مواد تأسيس الكهرباء 📦</option>
        <option value="عام" selected>قسم عام 🌟</option>
      </select>
    </div>

    <label for="title">الاسم أو العنوان</label>
    <input type="text" id="title" placeholder="اسم المنتج أو المشروع" />

    <label for="description">الوصف التفصيلي</label>
    <textarea id="description" placeholder="اكتب وصفاً جذاباً هنا..."></textarea>

    <!-- اختيار صورة أوتوماتيكي مع الضغط للـ WebP -->
    <label for="imageFile">صورة المنتج (سيتم تحويلها لـ WebP وتصغير أبعادها تلقائياً):</label>
    <input type="file" id="imageFile" accept="image/*" />

    <!-- خانة توضيح حجم الصورة قبل وبعد الضغط التلقائي -->
    <div id="sizeEstimationBox" style="display: none; margin-top: 15px; margin-bottom: 20px; padding: 18px; border-radius: 12px; background: #0c1e38; border: 1px solid rgba(59, 130, 246, 0.25); font-size: 14px; line-height: 1.6; text-align: right; box-shadow: inset 0 0 15px rgba(59, 130, 246, 0.1);">
      <div style="font-weight: bold; color: #3b82f6; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-size: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: 8px;">
        <span>📊</span> <span>تفاصيل تحسين وضغط الملف التلقائي:</span>
      </div>
      <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
        <span style="color: rgba(255, 255, 255, 0.7);">حجم الملف الأصلي:</span>
        <span id="originalSizeVal" style="font-weight: bold; color: #fca5a5; direction: ltr;">--</span>
      </div>
      <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
        <span style="color: rgba(255, 255, 255, 0.7);">الحجم المتوقع بعد الضغط والتحويل (WebP):</span>
        <span id="compressedSizeVal" style="font-weight: bold; color: #86efac; direction: ltr;">--</span>
      </div>
      <div style="display: flex; justify-content: space-between; border-top: 1px solid rgba(255, 255, 255, 0.08); padding-top: 8px; margin-top: 4px;">
        <span style="color: rgba(255, 255, 255, 0.85); font-weight: bold;">نسبة توفير المساحة المتوقعة:</span>
        <span id="savingsVal" style="font-weight: 900; color: #38bdf8; font-size: 16px;">--</span>
      </div>
    </div>

    <div class="preview-box">
      <img id="imagePreview" alt="معاينة الصورة" />
    </div>

    <!-- حقول السعر والخصومات والمخزون للمنتجات -->
    <div id="inventoryContainer">
      <label for="price">السعر الأصلي (د.ل) - اختياري</label>
      <input type="number" id="price" placeholder="مثال: 150" step="0.01" />

      <label for="discountPrice">سعر العرض / التخفيض (د.ل) - اختياري (يظهر كشطب للسعر القديم)</label>
      <input type="number" id="discountPrice" placeholder="مثال: 120" step="0.01" />

      <label for="stockStatus">حالة التوفر في المخزن:</label>
      <select id="stockStatus">
        <option value="available" selected>متوفر في المخزن ✅</option>
        <option value="out_of_stock">نفذت الكمية ❌</option>
      </select>

      <label for="stockQty">الكمية المتوفرة حالياً في المخزن:</label>
      <input type="number" id="stockQty" placeholder="مثال: 50" min="0" />
    </div>

    <label for="videoUrl">رابط الفيديو (اختياري)</label>
    <input type="url" id="videoUrl" placeholder="https://example.com/video.mp4" />

    <button id="saveBtn">حفظ ونشر في الموقع</button>

    <div id="response" class="response"></div>
  </div>

  <script>
    const saveBtn = document.getElementById("saveBtn");
    const responseBox = document.getElementById("response");
    const itemTypeSelect = document.getElementById("itemType");
    const categoryContainer = document.getElementById("categoryContainer");
    const inventoryContainer = document.getElementById("inventoryContainer");
    const imageFileInput = document.getElementById("imageFile");
    const imagePreview = document.getElementById("imagePreview");

    function getAdminPassword() {
      let pwd = sessionStorage.getItem('admin_password');
      if (!pwd) {
        pwd = prompt('الرجاء إدخال كلمة مرور مدير النظام:');
        if (pwd) {
          sessionStorage.setItem('admin_password', pwd);
        }
      }
      return pwd || "";
    }

    function formatBytes(bytes, decimals = 2) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    // معاينة الصورة المختارة وحساب نسب الضغط التلقائي
    imageFileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      const sizeBox = document.getElementById("sizeEstimationBox");
      
      if (file) {
        // 1. عرض معاينة الصورة
        const reader = new FileReader();
        reader.onload = (event) => {
          imagePreview.src = event.target.result;
          imagePreview.style.display = "inline-block";
        };
        reader.readAsDataURL(file);

        // 2. تفعيل حساب وضغط الملف التجريبي في المتصفح
        sizeBox.style.display = "block";
        const originalSize = file.size;
        document.getElementById("originalSizeVal").textContent = formatBytes(originalSize);
        document.getElementById("compressedSizeVal").textContent = "جاري حساب الضغط...";
        document.getElementById("savingsVal").textContent = "--";

        // إذا كان الملف صورة، نقوم بمحاكاة الضغط الفعلي
        if (file.type.startsWith("image/")) {
          const img = new Image();
          img.src = URL.createObjectURL(file);
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            let width = img.width;
            let height = img.height;
            const maxDim = 1600;

            // تطبيق نفس خوارزمية التصغير الخاصة بالسيرفر (Max 1600px inside)
            if (width > maxDim || height > maxDim) {
              if (width > height) {
                height = Math.round((height * maxDim) / width);
                width = maxDim;
              } else {
                width = Math.round((width * maxDim) / height);
                height = maxDim;
              }
            }

            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(img, 0, 0, width, height);

            // تصدير بصيغة WebP وبجودة 82% كما يفعل السيرفر تماماً
            canvas.toBlob((blob) => {
              let finalSize = 0;
              if (blob) {
                finalSize = blob.size;
              } else {
                finalSize = Math.round(originalSize * 0.3); // تقدير احتياطي
              }

              document.getElementById("compressedSizeVal").textContent = formatBytes(finalSize);
              const savingsPercent = Math.max(0, Math.round(((originalSize - finalSize) / originalSize) * 100));
              document.getElementById("savingsVal").textContent = `${savingsPercent}% 🔥`;

              URL.revokeObjectURL(img.src);
            }, "image/webp", 0.82);
          };
          img.onerror = () => {
            const finalSize = Math.round(originalSize * 0.35);
            document.getElementById("compressedSizeVal").textContent = formatBytes(finalSize);
            document.getElementById("savingsVal").textContent = "65% (تقديري) 🔥";
          };
        } else {
          // للملفات الأخرى كالفيديوهات
          const finalSize = Math.round(originalSize * 0.5);
          document.getElementById("compressedSizeVal").textContent = formatBytes(finalSize);
          document.getElementById("savingsVal").textContent = "50% (تقديري) 🔥";
        }
      } else {
        imagePreview.style.display = "none";
        sizeBox.style.display = "none";
      }
    });

    itemTypeSelect.addEventListener("change", (e) => {
      const isProject = e.target.value === "project";
      categoryContainer.style.display = isProject ? "block" : "none";
      inventoryContainer.style.display = isProject ? "none" : "block";
    });

    saveBtn.addEventListener("click", async () => {
      const itemType = itemTypeSelect.value;
      const category = document.getElementById("category").value.trim();
      const title = document.getElementById("title").value.trim();
      const description = document.getElementById("description").value.trim();
      const videoUrl = document.getElementById("videoUrl").value.trim();
      const file = imageFileInput.files[0];

      // حقول المخزون والأسعار
      const price = document.getElementById("price").value.trim();
      const discountPrice = document.getElementById("discountPrice").value.trim();
      const stockStatus = document.getElementById("stockStatus").value;
      const stockQty = document.getElementById("stockQty").value.trim();

      const pwd = getAdminPassword();
      if (!pwd) return showResponse("الرجاء إدخال كلمة مرور صالحة للنشر.", false);

      if (!title) return showResponse("الرجاء كتابة الاسم أو العنوان.", false);
      if (!description) return showResponse("الرجاء كتابة الوصف.", false);
      if (itemType === "project" && !category) return showResponse("الرجاء كتابة تصنيف المشروع.", false);
      if (!file && !videoUrl) return showResponse("يرجى اختيار صورة للمنتج.", false);

      saveBtn.disabled = true;
      saveBtn.textContent = "جاري تحويل الصورة وضغطها والرفع لـ R2...";

      try {
        const formData = new FormData();
        formData.append("name", title);
        formData.append("email", `media_${Date.now()}@upload.local`);
        formData.append("type", itemType);
        formData.append("description", description);
        formData.append("category", category);
        formData.append("videoUrl", videoUrl);
        
        // إلحاق بيانات الأسعار والمخزون في حال كان منتجاً
        if (itemType === "product") {
          formData.append("price", price);
          formData.append("discountPrice", discountPrice);
          formData.append("stockStatus", stockStatus);
          formData.append("stockQty", stockQty);
        }

        if (file) {
          formData.append("image", file);
        }

        const res = await fetch("https://enarah2.vercel.app/api/save-user", {
          method: "POST",
          headers: { 
            "x-admin-password": pwd
          },
          body: formData,
        });

        if (res.status === 401) {
          alert("غير مصرح لك بالنشر! كلمة المرور غير صحيحة.");
          sessionStorage.removeItem("admin_password");
          location.reload();
          return;
        }

        const data = await res.json();

        if (data.success) {
          showResponse("تم الرفع وضغط الصورة ونشر المنتج بنجاح! 🎉\nالرابط: " + (data.imageUrl || ""), true);
          document.getElementById("title").value = "";
          document.getElementById("description").value = "";
          document.getElementById("videoUrl").value = "";
          document.getElementById("category").value = "";
          document.getElementById("price").value = "";
          document.getElementById("discountPrice").value = "";
          document.getElementById("stockQty").value = "";
          document.getElementById("stockStatus").value = "available";
          imageFileInput.value = "";
          imagePreview.style.display = "none";
        } else {
          showResponse(data.error || "حدث خطأ غير متوقع.", false);
        }
      } catch (error) {
        showResponse("فشل في الاتصال بالسيرفر.", false);
        console.error(error);
      }

      saveBtn.disabled = false;
      saveBtn.textContent = "حفظ ونشر في الموقع";
    });

    function showResponse(message, success) {
      responseBox.style.display = "block";
      responseBox.textContent = message;
      responseBox.className = "response " + (success ? "success" : "error");
    }
  </script>

</body>
</html>
